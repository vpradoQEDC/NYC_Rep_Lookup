name: Build NYC Representatives Lookup

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 requests beautifulsoup4 pandas openpyxl lxml certifi pyinstaller

      - name: Verify required files exist
        shell: pwsh
        run: |
          $files = @(
            "main.py",
            "NYC_Representatives_Lookup.spec",
            "QEDC - Full Logo (Primary Color).png",
            "generated-image.png",
            "icon_256x256.ico",
            "Zipcodes-with-Reps-Complete.xlsx"
          )
          foreach ($f in $files) {
            if (-not (Test-Path $f)) {
              Write-Host "MISSING: $f"
              exit 1
            }
            Write-Host "Found: $f"
          }

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          pyinstaller "NYC_Representatives_Lookup.spec" --clean --noconfirm

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "Contents of dist folder:"
          Get-ChildItem -Recurse dist
          $found = Get-ChildItem -Path "dist" -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $found) {
            Write-Host "EXE not found in dist folder!"
            exit 1
          }
          Write-Host "EXE found: $($found.FullName)"
          Write-Host "File size: $($found.Length) bytes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NYC_Representatives_Lookup
          path: dist/NYC_Representatives_Lookup.exe
          retention-days: 30
