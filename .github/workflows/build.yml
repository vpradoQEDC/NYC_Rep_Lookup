name: Build Executable with Icon

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 pandas requests beautifulsoup4 openpyxl lxml
    
    - name: Build executable with PyInstaller (with spec file)
      run: |
        pyinstaller NYC_Representatives_Lookup.spec
    
    - name: Verify build artifacts
      run: |
        dir dist\NYC_Representatives_Lookup\
        dir dist\NYC_Representatives_Lookup\ /s
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NYC_Representatives_Lookup
        path: dist/NYC_Representatives_Lookup/
        retention-days: 90
